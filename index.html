<script>
  window.addEventListener('DOMContentLoaded', () => {
    // 画面の入力パーツをすべて捕捉
    const currentRevInput = document.getElementById("current-rev-input");
    const bizSelect = document.getElementById("biz-select");
    const toggleBtns = document.querySelectorAll(".toggle-container .toggle-btn");

    // 出力パーツをすべて捕捉
    const resLossVal = document.getElementById("res-loss-val");
    const tax2percent = document.getElementById("tax-2percent");
    const taxSimple = document.getElementById("tax-simple");
    const resRecommend = document.getElementById("res-recommend");
    const copyLinkBtn = document.getElementById("copy-link-btn");

    let isForcedTaxable = false; // 初期値：1000万円以下（本来は免税事業者）
    let shareText = "";

    // 【修正：機能①】課税売上高ボーダーラインボタンのパチパチ切り替え＆連動処理
    toggleBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        // まずすべてのボタンから「active（青色）」のクラスを綺麗に剥ぎ取る
        toggleBtns.forEach(b => b.classList.remove("active"));
        // 今押されたボタンだけに「active（青色）」をシュパッと付与
        btn.classList.add("active");

        // 押されたボタンのデータ属性から、2年前の売上が1000万超（強制課税）かどうかを判定
        const revValue = parseInt(btn.getAttribute("data-rev"));
        if (revValue > 1000) {
          isForcedTaxable = true; // 強制課税事業者モード
        } else {
          isForcedTaxable = false; // 本来は免税事業者モード
        }

        // ボタンが切り替わった瞬間に、下の計算結果も0秒でリアルタイム再計算
        calculateInvoice();
      });
    });

    // 【機能④】LocalStorageから過去に入力した数値を自動で安全に復元
    const savedCurrentRev = localStorage.getItem("cocoa-invoice-rev");
    const savedBiz = localStorage.getItem("cocoa-invoice-biz");
    const savedForced = localStorage.getItem("cocoa-invoice-forced");

    if (savedCurrentRev) currentRevInput.value = savedCurrentRev;
    if (savedBiz) bizSelect.value = savedBiz;
    if (savedForced === "true") {
      isForcedTaxable = true;
      toggleBtns[0].classList.remove("active");
      toggleBtns[1].classList.add("active");
    }

    // 【機能②・③・⑤】超軽量・リアルタイム消費税計算エンジン
    function calculateInvoice() {
      const currentRev = parseFloat(currentRevInput.value) || 0; // 現在の年間売上
      const mishiRate = parseFloat(bizSelect.value) || 0.5;      // 業種区分のみなし仕入れ率

      // 売上にかかる消費税の基本額（一律10%換算、万円単位）
      const baseTax = currentRev * 0.1;

      // ⚖️ プランA：2割特例（売上にかかる消費税の2割だけを納める、激変緩和措置）
      // ※法律上、2年前の売上が1000万超（強制課税）の人は2割特例を使えないため、基本額（10%全額）になります
      let taxA = 0;
      if (isForcedTaxable === true) {
        taxA = baseTax; // 2割特例は使えず、本則課税（全額）
      } else {
        taxA = baseTax * 0.2; // 2割特例が発動！
      }

      // ⚖️ プランB：簡易課税（売上にかかる消費税から、業種ごとのみなし仕入れ率を引いて納める）
      // 計算式：基本消費税 × (1 － みなし仕入れ率)
      const taxB = baseTax * (1 - mishiRate);

      // 【機能③】インボイス登録によるリアルな手取りの「目減り額（損失）」を逆算
      // 本来は免税だった人が、インボイスに登録して一番得な方法（AかBの安い方）で納めた場合の減額
      let lossValue = 0;
      if (isForcedTaxable === true) {
        lossValue = 0; // もともと課税事業者の人は、インボイスに関係なく消費税を払うので目減りは0
      } else {
        lossValue = Math.min(taxA, taxB); // 免税だった人が、一番安いプランで納税した額がそのまま手取りの減少になる
      }

      // どちらの計算プランがお得か自動判定
      let recommendPlan = "";
      if (isForcedTaxable === true) {
        recommendPlan = "簡易課税一択（みなし仕入れ控除）";
      } else {
        if (taxA < taxB) {
          recommendPlan = "プランA：2割特例";
        } else if (taxA > taxB) {
          recommendPlan = "プランB：簡易課税";
        } else {
          recommendPlan = "どちらのプランでも同額";
        }
      }

      // 画面上の出力パーツへ一瞬で超軽量反映
      resLossVal.innerText = lossValue.toFixed(1);
      
      if (isForcedTaxable === true) {
        tax2percent.innerText = "対象外 (本則換算: " + taxA.toFixed(1) + ")";
      } else {
        tax2percent.innerText = taxA.toFixed(1);
      }
      
      taxSimple.innerText = taxB.toFixed(1);
      resRecommend.innerText = recommendPlan;

      // 【機能④】数値をLocalStorageに自動記憶（次開いたときも残る）
      localStorage.setItem("cocoa-invoice-rev", currentRev);
      localStorage.setItem("cocoa-invoice-biz", mishiRate);
      localStorage.setItem("cocoa-invoice-forced", isForcedTaxable);

      // コピー用テキスト（ハッシュタグ・URLなし）
      shareText = "【インボイス・消費税一瞬判定結果】\n現在の売上: " + currentRev + "万円\n" +
                  (isForcedTaxable ? "・2年前の売上: 1000万超(強制課税)\n" : "・2年前の売上: 1000万以下(本来免税)\n") +
                  "・2割特例の納税額: " + tax2percent.innerText + "万円\n" +
                  "・簡易課税の納税額: " + taxB.toFixed(1) + "万円\n" +
                  "・登録による手取り目減り: 年約" + lossValue.toFixed(1) + "万円🚨\n" +
                  "💡結論: " + recommendPlan + " がお得！\nURLは一生同じ！";
    }

    // 入力や選択が変わった瞬間をリアルタイムで常時監視
    currentRevInput.addEventListener("input", calculateInvoice);
    bizSelect.addEventListener("change", calculateInvoice);

    // 最速コピー処理
    copyLinkBtn.addEventListener("click", () => {
      if (!shareText) return;
      navigator.clipboard.writeText(shareText).then(() => {
        copyLinkBtn.textContent = "判定コピー完了！Xへ移動します...💨";
        copyLinkBtn.style.backgroundColor = "#2ed573";
        setTimeout(() => {
          copyLinkBtn.textContent = "この消費税診断をコピーしてXで報告 📋";
          copyLinkBtn.style.backgroundColor = "#1da1f2";
        }, 1500);
      }).catch(() => {
        console.log("コピーエラー");
      });
    });

    // 起動時に最初の計算を一発走らせる
    calculateInvoice();
  });
</script>
